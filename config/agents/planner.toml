[agent]
role = "planner"
name = "planner"
description = "Creates chapter plans with intent, memo, and thread references"

[prompt]
template_file = "prompts/planner.md"
variables = { language = "zh" }

[tools]
allowed = ["read_chapter", "read_character", "read_knowledge", "search_memory"]
denied = ["write_chapter", "write_plan"]

[context]
required = ["story_state", "chapter_number"]
optional = ["recent_chapters", "character_profiles", "world_settings"]
token_budget = 6000

[output]
format = "structured_json"
validation = "check_plan_fields"

[constraints]
must_do = [
    "create_clear_chapter_goal",
    "reference_existing_threads",
    "maintain_story_arc"
]
must_not_do = [
    "skip_existing_plot_threads",
    "introduce_inconsistent_events"
]
