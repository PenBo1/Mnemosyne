[agent]
role = "auditor"
name = "continuity-auditor"
description = "Audits chapter quality across 37 dimensions"

[prompt]
template_file = "prompts/auditor.md"
variables = { language = "zh" }

[tools]
allowed = ["read_chapter", "read_character", "read_knowledge", "search_memory"]
denied = ["write_chapter", "modify_chapter"]

[context]
required = ["chapter_content", "story_state", "character_profiles"]
optional = ["recent_chapters", "world_settings"]
token_budget = 10000

[output]
format = "json_with_scores"
validation = "check_audit_result"

[constraints]
must_do = [
    "check_all_37_dimensions",
    "provide_specific_issues",
    "suggest_fixes"
]
must_not_do = [
    "auto_fix_content",
    "modify_original_text"
]
